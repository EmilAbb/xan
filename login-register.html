<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş/Qeydiyyat</title>
    <link rel="stylesheet" href="/assets/css/login-register.css">
</head>

<body style="background-image: url(/assets/images/body_bg.jpg);">
    <section class="" >
        <div class="container login-register-screen">
            <div class="log-reg-container">
                <div class="register-screen lr-container">
                    <h3 class="log-regis">QEYDIYYAT</h3>
                    <form action="" class="register-form form-x">
                        <div class="form-input">
                            <input type="text" name="fullname" placeholder="Ad\Soyad">
                        </div>
                        <div class="form-input">
                            <input type="email" name="email" placeholder="Email adresinizi daxil edin">
                        </div>
                        <div class="form-input">
                            <input type="text" name="phone" placeholder="Telefon nömrəsi">
                        </div>
                        <div class="form-input">
                            <input type="password" name="password" placeholder="Şifrənizi daxil edin">
                        </div>
                        <button class="submit-btn">
                            <span class="btn-span">QEYDİYYAT</span>
                        </button>
                    </form>
                </div>
                <div class="login-screen lr-container">
                    <h3 class="log-regis">Daxil ol</h3>
                    <form action="" class="login-form form-x">
                        <div class="form-input">
                            <input type="email" name="email" placeholder="Email adresinizi daxil edin">
                        </div>
                        <div class="form-input">
                            <input type="password" name="password" placeholder="Şifrənizi daxil edin">
                        </div>
                        <div class="forget-remember">
                            <div class="remember-container">
                                <label for="remember">Məni xatırla
                                    <input type="checkbox" class="remember" id="remember" name="remember_me">
                                </label>
                            </div>
                            <div class="forget-container">
                                <a href="/forget-password.html">Şifrəmi unutdum</a>
                            </div>
                        </div>
                        <button class="submit-btn">
                            <span class="btn-span">Giriş</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>

    </section>
</body>

</html>
